<header class="main-header" role="banner">
    <a href="index.html" id="top-left-logo-link" aria-label="Zur Startseite">
        <img src="images/favicon.webp" alt="Michael Kanda Logo" id="top-left-logo-img" width="40" height="40" loading="eager">
    </a>
    
    <nav class="header-right-controls" aria-label="Schnellzugriff">
        
        <button 
            class="theme-toggle-icon" 
            id="theme-toggle" 
            type="button"
            aria-label="Farbschema umschalten" 
            aria-describedby="theme-status"
            role="switch" 
            aria-checked="false">

            </svg>
            
            <svg class="theme-icon-light" xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 -960 960 960" fill="currentColor" shape-rendering="geometricPrecision">
                <path d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Zm326-268Z"/>

        </button>
        <span id="theme-status" class="visually-hidden">Aktuell: Dunkelmodus</span>

        <button 
            id="contact-button" 
            type="button"
            aria-label="Kontaktformular öffnen"
            aria-haspopup="dialog">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 -960 960 960" fill="currentColor" shape-rendering="geometricPrecision">
                <path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm320-280L160-640v400h640v-400L480-440Zm0-80 320-200H160l320 200ZM160-640v-80 480-400Z"/>

         <button 
            id="evita-chat-button" 
            type="button"
            class="evita-header-avatar"
            aria-label="Chat mit Evita öffnen"
            aria-haspopup="dialog">
            <img src="images/evita-ki-assistentin-button.webp" alt="Evita" width="36" height="36" loading="eager">
            <span class="evita-avatar-pulse"></span>
        </button>

        <button 
            id="menu-toggle-button" 
            type="button"
            aria-label="Hauptmenü öffnen"
            aria-expanded="false"
            aria-controls="main-navigation"
            aria-haspopup="menu">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 -960 960 960" fill="currentColor" shape-rendering="geometricPrecision">
                <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
            </svg>
        </button>
