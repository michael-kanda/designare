<header class="main-header" role="banner">
    <a href="index.html" id="top-left-logo-link" aria-label="Zur Startseite">
        <img src="images/favicon.webp" alt="Michael Kanda Logo" id="top-left-logo-img" width="40" height="40" loading="eager">
    </a>
    
    <nav class="header-right-controls" aria-label="Schnellzugriff">
        <!-- Theme Toggle: Einzelnes Icon (Material Symbols) -->
        <button 
            class="theme-toggle-icon" 
            id="theme-toggle" 
            type="button"
            aria-label="Farbschema umschalten" 
            aria-describedby="theme-status"
            role="switch" 
            aria-checked="false">
            <span class="material-symbols-outlined theme-icon-dark">dark_mode</span>
            <span class="material-symbols-outlined theme-icon-light">sunny</span>
        </button>
        <span id="theme-status" class="visually-hidden">Aktuell: Dunkelmodus</span>

        <!-- AUSKOMMENTIERT: Alter Toggle mit Schalter
        <div class="theme-toggle-wrapper" role="group" aria-label="Farbschema wählen">
            <span class="toggle-icon-left" aria-hidden="true">
                <i class="fas fa-moon"></i>
            </span>
            <button 
                class="theme-toggle" 
                id="theme-toggle" 
                type="button"
                aria-label="Farbschema umschalten" 
                aria-describedby="theme-status"
                role="switch" 
                aria-checked="false">
                <span class="toggle-knob"></span>
            </button>
            <span id="theme-status" class="visually-hidden">Aktuell: Dunkelmodus</span>
            <span class="toggle-icon-right" aria-hidden="true">
                <i class="fas fa-sun"></i>
            </span>
        </div>
        -->
 
      <button 
            id="cookie-settings-button" 
            type="button"
            aria-label="Cookie-Einstellungen öffnen"
            onclick="ConsentManager.showSettings();">
            <span class="material-symbols-outlined" aria-hidden="true">cookie</span>
        </button>
        
        <button 
            id="contact-button" 
            type="button"
            aria-label="Kontaktformular öffnen"
            aria-haspopup="dialog">
            <span class="material-symbols-outlined" aria-hidden="true">mail</span>
        </button>
        
         <button 
            id="evita-chat-button" 
            type="button"
            class="evita-header-avatar"
            aria-label="Chat mit Evita öffnen"
            aria-haspopup="dialog">
            <img src="images/evita-ki-assistentin-button.webp" alt="Evita" width="36" height="36" loading="eager">
            <span class="evita-avatar-pulse"></span>
        </button>

        <button 
            id="menu-toggle-button" 
            type="button"
            aria-label="Hauptmenü öffnen"
            aria-expanded="false"
            aria-controls="main-navigation"
            aria-haspopup="menu">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
    </nav>
</header>
