<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evita & Silas Dashboard – designare.at</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

    :root {
      --bg-primary: #08080f;
      --bg-card: #111119;
      --bg-card-hover: #16161f;
      --border: #1e1e2e;
      --text-primary: #e8e8ed;
      --text-secondary: #8888a0;
      --text-muted: #555566;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.15);
      --green: #00d68f;
      --green-bg: rgba(0, 214, 143, 0.1);
      --red: #ff6b6b;
      --red-bg: rgba(255, 107, 107, 0.1);
      --orange: #ffa502;
      --orange-bg: rgba(255, 165, 2, 0.1);
      --blue: #4facfe;
      --blue-bg: rgba(79, 172, 254, 0.1);
      --silas: #e17055;
      --silas-bg: rgba(225, 112, 85, 0.1);
      --silas-glow: rgba(225, 112, 85, 0.15);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ============================================ */
    /* HEADER                                       */
    /* ============================================ */
    .dashboard-header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .dashboard-header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dashboard-header h1 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .range-select {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .refresh-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .refresh-btn:hover { opacity: 0.85; }

    .last-updated {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ============================================ */
    /* TABS                                         */
    /* ============================================ */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 16px 32px 0;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 10px 24px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      margin-bottom: -1px;
    }

    .tab-btn:hover {
      color: var(--text-primary);
      background: var(--bg-card);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-btn.active.silas-tab {
      color: var(--silas);
      border-bottom-color: var(--silas);
    }

    .tab-btn.active.builds-tab {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .tab-btn.active.health-tab {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ============================================ */
    /* HEALTH TAB                                   */
    /* ============================================ */
    .health-status-banner {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .health-status-icon {
      font-size: 2rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .health-status-icon.healthy { background: var(--green-bg); }
    .health-status-icon.warning { background: var(--orange-bg); }
    .health-status-icon.degraded { background: var(--red-bg); }
    .health-status-icon.critical { background: var(--red-bg); }
    .health-status-info { flex: 1; }
    .health-status-title { font-weight: 700; font-size: 1.1rem; }
    .health-status-meta { color: var(--text-secondary); font-size: 0.85rem; margin-top: 2px; }

    .health-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .health-service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      transition: border-color 0.2s;
    }
    .health-service-card:hover { border-color: var(--text-muted); }
    .health-service-card .service-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .health-service-card .service-name {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .health-service-card .service-badge {
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .service-badge.ok { background: var(--green-bg); color: var(--green); }
    .service-badge.warn { background: var(--orange-bg); color: var(--orange); }
    .service-badge.error { background: var(--red-bg); color: var(--red); }
    .health-service-card .service-latency {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .health-service-card .service-detail {
      color: var(--text-secondary);
      font-size: 0.8rem;
      margin-top: 4px;
    }
    .health-service-card .service-error {
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .health-incident {
      padding: 10px 16px;
      border-left: 3px solid var(--red);
      background: var(--red-bg);
      border-radius: 0 8px 8px 0;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .health-incident.recovery {
      border-left-color: var(--green);
      background: var(--green-bg);
    }
    .health-incident .incident-time {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .health-log-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .health-log-row:last-child { border-bottom: none; }
    .health-log-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .health-log-dot.healthy { background: var(--green); }
    .health-log-dot.warning { background: var(--orange); }
    .health-log-dot.degraded { background: var(--red); }
    .health-log-dot.critical { background: var(--red); box-shadow: 0 0 6px var(--red); }

    /* ============================================ */
    /* BUILDS TAB                                   */
    /* ============================================ */
    .build-status-banner {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .build-status-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .build-status-icon.success { background: var(--green-bg); }
    .build-status-icon.partial { background: var(--orange-bg); }
    .build-status-icon.failed { background: var(--red-bg); }
    .build-status-icon.none { background: rgba(255,255,255,0.05); }

    .build-status-info { flex: 1; }

    .build-status-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .build-status-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .build-trigger-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .build-trigger-btn:hover { opacity: 0.85; }
    .build-trigger-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .build-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .build-detail-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }

    .build-detail-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .build-detail-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .build-detail-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .build-log-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: var(--bg-card-hover);
      transition: background 0.15s;
    }

    .build-log-item:hover {
      background: rgba(255,255,255,0.04);
    }

    .build-log-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .build-log-dot.success { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .build-log-dot.partial { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
    .build-log-dot.failed { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .build-log-dot.triggered { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
    .build-log-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }

    .build-log-content { flex: 1; min-width: 0; }

    .build-log-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .build-log-details {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .build-log-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
      text-align: right;
    }

    .build-tag {
      display: inline-block;
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .build-tag.cron { background: var(--blue-bg); color: var(--blue); }
    .build-tag.manual { background: var(--accent-glow); color: var(--accent); }
    .build-tag.dashboard { background: var(--orange-bg); color: var(--orange); }

    .build-files-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .build-file-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 3px 10px;
      background: rgba(79, 172, 254, 0.08);
      color: var(--blue);
      border-radius: 4px;
    }

    .build-category-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .build-category-tag {
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    .build-category-tag span {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--text-primary);
    }

    @media (max-width: 900px) {
      .build-detail-grid { grid-template-columns: 1fr 1fr; }
      .build-status-banner { flex-wrap: wrap; }
    }

    /* INVENTORY LISTS */
    .inventory-section {
      margin-bottom: 24px;
    }

    .inventory-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 14px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.2s, background 0.2s;
    }

    .inventory-toggle:hover {
      border-color: var(--blue);
      background: var(--bg-card-hover);
    }

    .inventory-toggle-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .inventory-toggle-icon {
      font-size: 1.2rem;
    }

    .inventory-toggle-title {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .inventory-toggle-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--blue);
      background: var(--blue-bg);
      padding: 2px 10px;
      border-radius: 6px;
      font-weight: 600;
    }

    .inventory-toggle-arrow {
      color: var(--text-muted);
      transition: transform 0.2s;
      font-size: 0.8rem;
    }

    .inventory-toggle.open .inventory-toggle-arrow {
      transform: rotate(180deg);
    }

    .inventory-list {
      display: none;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      max-height: 500px;
      overflow-y: auto;
    }

    .inventory-list.open {
      display: block;
    }

    .inventory-list::-webkit-scrollbar { width: 4px; }
    .inventory-list::-webkit-scrollbar-track { background: transparent; }
    .inventory-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .inventory-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
    }

    .inventory-item:last-child { border-bottom: none; }
    .inventory-item:hover { background: var(--bg-card-hover); }

    .inventory-item-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      min-width: 24px;
      text-align: right;
      padding-top: 2px;
    }

    .inventory-item-content { flex: 1; min-width: 0; }

    .inventory-item-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inventory-item-meta {
      font-size: 0.72rem;
      color: var(--text-secondary);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .inventory-item-slug {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .inventory-type-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      padding: 1px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .inventory-type-badge.article { background: var(--silas-bg); color: var(--silas); }
    .inventory-type-badge.page { background: var(--blue-bg); color: var(--blue); }
    .inventory-type-badge.homepage { background: var(--accent-glow); color: var(--accent); }
    .inventory-type-badge.blog { background: var(--orange-bg); color: var(--orange); }

    .inventory-cat-badge {
      font-size: 0.65rem;
      padding: 1px 7px;
      border-radius: 4px;
      background: var(--accent-glow);
      color: var(--accent);
      font-weight: 600;
    }

    .inventory-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .inventory-keyword {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
    }

    .inventory-stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      flex-shrink: 0;
      text-align: right;
      padding-top: 2px;
    }

    .inventory-filter {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: none;
    }

    .inventory-filter input {
      flex: 1;
      background: var(--bg-card-hover);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      outline: none;
    }

    .inventory-filter input:focus { border-color: var(--blue); }
    .inventory-filter input::placeholder { color: var(--text-muted); }

    /* ============================================ */
    /* MAIN GRID                                    */
    /* ============================================ */
    .dashboard-main {
      padding: 24px 32px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* KPI CARDS ROW */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s, background 0.2s;
    }

    .kpi-card:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
    }

    .kpi-card.silas-accent:hover {
      border-color: var(--silas);
    }

    .kpi-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .kpi-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .kpi-value.green { color: var(--green); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.orange { color: var(--orange); }
    .kpi-value.blue { color: var(--blue); }
    .kpi-value.accent { color: var(--accent); }
    .kpi-value.silas-color { color: var(--silas); }

    /* CHART GRID */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .chart-card.full-width {
      grid-column: 1 / -1;
    }

    .chart-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chart-container {
      position: relative;
      height: 260px;
    }

    /* LIST CARDS */
    .list-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .list-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      max-height: 420px;
      overflow-y: auto;
    }

    .list-card::-webkit-scrollbar { width: 4px; }
    .list-card::-webkit-scrollbar-track { background: transparent; }
    .list-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .list-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: background 0.15s;
    }

    .list-item:hover { background: var(--bg-card-hover); }

    .list-item-text {
      font-size: 0.85rem;
      color: var(--text-primary);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 12px;
    }

    .list-item-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      flex-shrink: 0;
    }

    .list-item-count.silas-color { color: var(--silas); }

    .list-item-bar {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin-top: 6px;
      opacity: 0.3;
    }

    .list-item-bar.silas-bar { background: var(--silas); }

    /* VISIBILITY SECTION */
    .visibility-section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .visibility-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
    }

    .vis-check-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg-card-hover);
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .vis-domain {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-primary);
    }

    .vis-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 6px;
    }

    .vis-score.hoch { background: var(--green-bg); color: var(--green); }
    .vis-score.mittel { background: var(--orange-bg); color: var(--orange); }
    .vis-score.niedrig { background: var(--red-bg); color: var(--red); }

    .vis-industry {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* FALLBACK / ERROR LIST */
    .fallback-item {
      padding: 10px 14px;
      background: var(--red-bg);
      border-left: 3px solid var(--red);
      border-radius: 0 8px 8px 0;
      margin-bottom: 6px;
    }

    .fallback-msg {
      font-size: 0.82rem;
      color: var(--text-primary);
    }

    .fallback-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 4px;
    }

    .fallback-type {
      display: inline-block;
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    .fallback-type.rate_limit { background: var(--orange-bg); color: var(--orange); }
    .fallback-type.api_error { background: var(--red-bg); color: var(--red); }
    .fallback-type.timeout { background: var(--blue-bg); color: var(--blue); }
    .fallback-type.unknown { background: rgba(255,255,255,0.05); color: var(--text-muted); }

    /* EMAIL LOG */
    .email-log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--green-bg);
      border-left: 3px solid var(--green);
      border-radius: 0 8px 8px 0;
      margin-bottom: 6px;
    }

    .email-log-item.failed {
      background: var(--red-bg);
      border-left-color: var(--red);
    }

    .email-log-main {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .email-log-status { font-size: 0.9rem; flex-shrink: 0; }

    .email-log-to {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .email-log-subject {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .email-log-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
      margin-left: 12px;
    }

    /* BLOCKLIST */
    .blocklist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: rgba(239, 68, 68, 0.06);
      border-left: 3px solid var(--red);
      border-radius: 0 8px 8px 0;
      margin-bottom: 4px;
    }

    .blocklist-email {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-primary);
    }

    .blocklist-remove {
      background: none;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .blocklist-remove:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    /* WHITELIST */
    .whitelist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: rgba(0, 214, 143, 0.06);
      border-left: 3px solid var(--green);
      border-radius: 0 8px 8px 0;
      margin-bottom: 4px;
    }

    .whitelist-email {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-primary);
    }

    .whitelist-remove {
      background: none;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .whitelist-remove:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .whitelist-add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .whitelist-add-form input {
      flex: 1;
      background: var(--bg-card-hover);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .whitelist-add-form input:focus {
      border-color: var(--green);
    }

    .whitelist-add-form input::placeholder {
      color: var(--text-muted);
    }

    .whitelist-add-btn {
      background: var(--green);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .whitelist-add-btn:hover { opacity: 0.85; }

    /* HEATMAP */
    .heatmap-grid {
      display: grid;
      grid-template-columns: 40px repeat(24, 1fr);
      gap: 2px;
      font-size: 0.65rem;
    }

    .heatmap-label {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
    }

    .heatmap-cell {
      aspect-ratio: 1;
      border-radius: 3px;
      background: var(--bg-card-hover);
      min-height: 16px;
    }

    .heatmap-hour-labels {
      display: grid;
      grid-template-columns: 40px repeat(24, 1fr);
      gap: 2px;
      margin-bottom: 4px;
    }

    .heatmap-hour {
      text-align: center;
      font-size: 0.6rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* SILAS DOWNLOAD BREAKDOWN */
    .download-breakdown {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }

    .download-type {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .download-type-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    .download-type-count {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* LOADING & ERROR STATES */
    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: var(--red-bg);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      max-width: 500px;
      margin: 40px auto;
    }

    .error-box h3 { color: var(--red); margin-bottom: 8px; }

    #auth-form {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }

    #auth-form input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      width: 250px;
    }

    .no-data {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 30px 0;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .dashboard-main { padding: 16px; }
      .chart-grid, .list-grid, .visibility-grid { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
      .dashboard-header { padding: 16px; }
      .tab-bar { padding: 12px 16px 0; }
      .tab-btn { padding: 8px 16px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="dashboard-header">
    <h1><span class="dot"></span> Evita & Silas Dashboard</h1>
    <div class="header-controls">
      <select class="range-select" id="rangeSelect" onchange="loadDashboard()">
        <option value="7">7 Tage</option>
        <option value="14">14 Tage</option>
        <option value="30" selected>30 Tage</option>
        <option value="90">90 Tage</option>
      </select>
      <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
      <span class="last-updated" id="lastUpdated"></span>
    </div>
  </header>

  <!-- TABS -->
  <nav class="tab-bar" id="tabBar" style="display:none;">
    <button class="tab-btn active" data-tab="evita" onclick="switchTab('evita')">💬 Evita Chatbot</button>
    <button class="tab-btn silas-tab" data-tab="silas" onclick="switchTab('silas')">✍️ Silas Content</button>
    <button class="tab-btn builds-tab" data-tab="builds" onclick="switchTab('builds')">🔄 KI-Datenbank</button>
    <button class="tab-btn health-tab" data-tab="health" onclick="switchTab('health')">🏥 Health</button>
  </nav>

  <!-- CONTENT -->
  <main class="dashboard-main" id="dashboardContent">
    <div class="loading-overlay" id="loadingState">
      <div class="spinner"></div>
      <span style="color: var(--text-secondary); font-size: 0.9rem;">Lade Dashboard-Daten...</span>
    </div>
  </main>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    let TOKEN = localStorage.getItem('evita_dashboard_token') || new URLSearchParams(window.location.search).get('token') || '';
    let chartInstances = {};
    let cachedData = null;

    if (TOKEN) {
      localStorage.setItem('evita_dashboard_token', TOKEN);
      loadDashboard();
    } else {
      showAuthForm();
    }

    // ============================================================
    // TABS
    // ============================================================
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      const target = document.getElementById(`tab-${tab}`);
      if (target) target.classList.add('active');

      // Re-render charts for visible tab (Chart.js needs visible canvas)
      if (cachedData) {
        setTimeout(() => {
          if (tab === 'evita') {
            renderEvitaCharts(cachedData);
          } else if (tab === 'silas') {
            renderSilasCharts(cachedData);
          }
          // builds tab hat keine Charts
        }, 50);
      }
    }

    // ============================================================
    // AUTH
    // ============================================================
    function showAuthForm() {
      document.getElementById('tabBar').style.display = 'none';
      document.getElementById('dashboardContent').innerHTML = `
        <div class="error-box">
          <h3>🔐 Authentifizierung erforderlich</h3>
          <p style="color: var(--text-secondary); margin-bottom: 12px;">Dashboard-Token eingeben:</p>
          <form id="auth-form" onsubmit="submitToken(event)">
            <input type="password" id="tokenInput" placeholder="Token" autofocus>
            <button type="submit" class="refresh-btn">→</button>
          </form>
        </div>
      `;
    }

    function submitToken(e) {
      e.preventDefault();
      TOKEN = document.getElementById('tokenInput').value.trim();
      if (TOKEN) {
        localStorage.setItem('evita_dashboard_token', TOKEN);
        document.getElementById('dashboardContent').innerHTML = `
          <div class="loading-overlay"><div class="spinner"></div></div>
        `;
        loadDashboard();
      }
    }

    // ============================================================
    // LOAD DATA
    // ============================================================
    async function loadDashboard() {
      const range = document.getElementById('rangeSelect')?.value || 30;
      
      try {
        const res = await fetch(`/api/evita-dashboard?range=${range}&token=${TOKEN}&_=${Date.now()}`);
        
        if (res.status === 401) {
          localStorage.removeItem('evita_dashboard_token');
          TOKEN = '';
          showAuthForm();
          return;
        }
        
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        cachedData = data;

        document.getElementById('tabBar').style.display = 'flex';
        renderDashboard(data);
        
        document.getElementById('lastUpdated').textContent = 
          `Aktualisiert: ${new Date().toLocaleTimeString('de-AT')}`;
          
      } catch (error) {
        document.getElementById('dashboardContent').innerHTML = `
          <div class="error-box">
            <h3>❌ Fehler beim Laden</h3>
            <p style="color: var(--text-secondary);">${error.message}</p>
            <button class="refresh-btn" onclick="loadDashboard()" style="margin-top: 12px;">Erneut versuchen</button>
          </div>
        `;
      }
    }

    // ============================================================
    // RENDER MAIN
    // ============================================================
    function renderDashboard(data) {
      // Destroy old charts
      Object.values(chartInstances).forEach(c => c.destroy());
      chartInstances = {};

      const evitaHTML = renderEvitaTab(data);
      const silasHTML = renderSilasTab(data);
      const buildsHTML = renderBuildsTab(data);
      const healthHTML = renderHealthTab(data);

      const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'evita';

      document.getElementById('dashboardContent').innerHTML = `
        <div id="tab-evita" class="tab-content ${activeTab === 'evita' ? 'active' : ''}">${evitaHTML}</div>
        <div id="tab-silas" class="tab-content ${activeTab === 'silas' ? 'active' : ''}">${silasHTML}</div>
        <div id="tab-builds" class="tab-content ${activeTab === 'builds' ? 'active' : ''}">${buildsHTML}</div>
        <div id="tab-health" class="tab-content ${activeTab === 'health' ? 'active' : ''}">${healthHTML}</div>
      `;

      // Render charts for active tab
      if (activeTab === 'evita') {
        renderEvitaCharts(data);
      } else if (activeTab === 'silas') {
        renderSilasCharts(data);
      }
    }

    // ============================================================
    // EVITA TAB
    // ============================================================
    function renderEvitaTab(data) {
      const s = data.summary;
      const p = s.period;
      const t = s.today;

      let html = '';

      // ===== KPI ROW =====
      html += `<div class="kpi-row">
        <div class="kpi-card">
          <div class="kpi-label">Gespräche heute</div>
          <div class="kpi-value accent">${t.chats}</div>
          <div class="kpi-sub">${p.total_chats} im Zeitraum</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Nachrichten heute</div>
          <div class="kpi-value">${t.messages}</div>
          <div class="kpi-sub">⌀ ${p.avg_messages_per_chat} pro Chat</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Unique Besucher</div>
          <div class="kpi-value blue">${t.unique_visitors}</div>
          <div class="kpi-sub">${p.unique_visitors} im Zeitraum</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Booking Conversion</div>
          <div class="kpi-value green">${p.booking_conversion}%</div>
          <div class="kpi-sub">${p.booking_completions}/${p.booking_intents} Intents</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Fallback-Rate</div>
          <div class="kpi-value ${p.fallback_rate > 10 ? 'red' : p.fallback_rate > 5 ? 'orange' : 'green'}">${p.fallback_rate}%</div>
          <div class="kpi-sub">${p.fallback_count} Fallbacks</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Wiederkehrende</div>
          <div class="kpi-value orange">${p.returning_rate}%</div>
          <div class="kpi-sub">${p.returning_users} / ${p.new_users + p.returning_users}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Visibility Checks</div>
          <div class="kpi-value">${p.visibility_checks}</div>
          <div class="kpi-sub">${t.visibility_checks} heute</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">📩 Report-Mails</div>
          <div class="kpi-value green">${p.visibility_emails || 0}</div>
          <div class="kpi-sub">${t.visibility_emails || 0} heute</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">📧 E-Mails gesendet</div>
          <div class="kpi-value green">${p.emails_sent}</div>
          <div class="kpi-sub">${t.emails_sent || 0} heute${p.emails_failed > 0 ? ` · ${p.emails_failed} fehlgeschlagen` : ''}</div>
        </div>
      </div>`;

      // ===== CHARTS =====
      html += `<div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">📈 Nachrichten & Chats</div>
          <div class="chart-container"><canvas id="msgChart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">🤖 Modell-Nutzung</div>
          <div class="chart-container"><canvas id="modelChart"></canvas></div>
        </div>
      </div>`;

      // ===== LISTS =====
      html += `<div class="list-grid">
        <div class="list-card">
          <div class="list-title">🔥 Top-Fragen</div>
          ${data.topQuestions.length > 0 
            ? data.topQuestions.map((q, i) => `
              <div class="list-item">
                <span class="list-item-text">${i+1}. ${escHTML(q.question)}</span>
                <span class="list-item-count">${q.count}×</span>
              </div>
            `).join('')
            : '<div class="no-data">Noch keine Daten</div>'
          }
        </div>
        <div class="list-card">
          <div class="list-title">📌 Top-Themen</div>
          ${data.topTopics.length > 0
            ? data.topTopics.map(t => {
              const maxCount = data.topTopics[0]?.count || 1;
              const pct = Math.round((t.count / maxCount) * 100);
              return `
                <div class="list-item" style="flex-direction:column;align-items:stretch;">
                  <div style="display:flex;justify-content:space-between;">
                    <span class="list-item-text">${escHTML(t.topic)}</span>
                    <span class="list-item-count">${t.count}</span>
                  </div>
                  <div class="list-item-bar" style="width:${pct}%"></div>
                </div>
              `;
            }).join('')
            : '<div class="no-data">Noch keine Daten</div>'
          }
        </div>
      </div>`;

      // ===== HEATMAP =====
      html += `<div class="chart-card full-width" style="margin-bottom:24px;">
        <div class="chart-title">🕐 Aktivitäts-Heatmap</div>
        ${renderHeatmap(data.heatmap, 'accent')}
      </div>`;

      // ===== VISIBILITY =====
      if (data.visibility) {
        const vd = data.visibility.scoreDistribution;
        const total = vd.hoch + vd.mittel + vd.niedrig;
        
        html += `<div class="visibility-section">
          <div class="section-title">🔍 KI-Sichtbarkeits-Checks</div>
          <div class="visibility-grid">
            <div class="chart-card">
              <div class="chart-title">Score-Verteilung</div>
              ${total > 0
                ? `<div class="chart-container" style="height:200px;"><canvas id="visChart"></canvas></div>`
                : '<div class="no-data">Noch keine Checks</div>'
              }
            </div>
            <div class="list-card">
              <div class="list-title">Letzte Checks</div>
              ${data.visibility.recentChecks.length > 0
                ? data.visibility.recentChecks.map(c => {
                  const cat = c.score >= 65 ? 'hoch' : c.score >= 35 ? 'mittel' : 'niedrig';
                  return `
                    <div class="vis-check-item">
                      <div>
                        <div class="vis-domain">${escHTML(c.domain)}</div>
                        <div class="vis-industry">${escHTML(c.industry || '–')} · ${c.mentionCount}/${c.totalTests} Mentions</div>
                      </div>
                      <span class="vis-score ${cat}">${c.score}/100</span>
                    </div>
                  `;
                }).join('')
                : '<div class="no-data">Noch keine Checks</div>'
              }
            </div>
          </div>
        </div>`;
      }

      // ===== VISIBILITY REPORT EMAILS =====
      if (data.visibilityEmails && data.visibilityEmails.length > 0) {
        html += `<div class="chart-card full-width" style="margin-bottom:24px;">
          <div class="chart-title">📩 Letzte Report-Mails (KI-Sichtbarkeit)</div>
          ${data.visibilityEmails.map(e => `
            <div class="vis-check-item">
              <div>
                <div class="vis-domain">${escHTML(e.domain)}</div>
                <div class="vis-industry">${escHTML(e.email)} · ${escHTML(e.industry || '–')}${e.timestamp ? ` · ${new Date(e.timestamp).toLocaleString('de-AT')}` : ''}</div>
              </div>

        html += `<div class="chart-card full-width" style="margin-bottom:24px;">

            <div class="email-log-item ${e.success ? '' : 'failed'}">

                <span class="email-log-to">${escHTML(e.to)}</span>
                <span class="email-log-subject">${escHTML(e.subject)}</span>
              </div>
              ${e.timestamp ? `<div class="email-log-time">${new Date(e.timestamp).toLocaleString('de-AT')}</div>` : ''}
            </div>
          `).join('')}
        </div>`;
      }

      // ===== EMAIL WHITELIST (Erlaubte Empfänger) =====
      html += `<div class="chart-card full-width" style="margin-bottom:24px;">
        <div class="chart-title">✅ E-Mail Whitelist <span style="font-weight:400;color:var(--text-muted);font-size:0.75rem;">(${(data.emailWhitelist || []).length} erlaubt)</span></div>
        <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:12px;">Evita darf nur an diese Adressen E-Mails versenden. Ist die Liste leer, ist der Versand komplett gesperrt.</div>
        <div class="whitelist-add-form">

        </div>
        ${(data.emailWhitelist || []).length > 0
          ? data.emailWhitelist.map(email => `
            <div class="whitelist-item">
              <span class="whitelist-email">${escHTML(email)}</span>
              <button class="whitelist-remove" onclick="removeFromWhitelist('${escHTML(email)}')" title="Entfernen">✕</button>

          `).join('')
          : '<div class="no-data">Noch keine Empfänger freigeschaltet – Evita kann keine E-Mails senden.</div>'

      </div>`;

      // ===== EMAIL BLOCKLIST =====
      if (data.emailBlocklist && data.emailBlocklist.length > 0) {
        html += `<div class="chart-card full-width" style="margin-bottom:24px;">
          <div class="chart-title">🚫 E-Mail Blocklist <span style="font-weight:400;color:var(--text-muted);font-size:0.75rem;">(${data.emailBlocklist.length} blockiert)</span></div>
          ${data.emailBlocklist.map(email => `
            <div class="blocklist-item">
              <span class="blocklist-email">${escHTML(email)}</span>
              <button class="blocklist-remove" onclick="removeFromBlocklist('${escHTML(email)}')" title="Entsperren">✕</button>
            </div>
          `).join('')}
        </div>`;
      }

      // ===== FALLBACKS =====
      html += `<div class="chart-card full-width">
        <div class="chart-title">⚠️ Letzte Fallbacks <span style="font-weight:400;color:var(--text-muted);font-size:0.75rem;">(Wo Evita nicht weiter wusste)</span></div>
        ${data.recentFallbacks.length > 0
          ? data.recentFallbacks.map(f => `
            <div class="fallback-item">
              <div class="fallback-msg">"${escHTML(f.message)}"</div>
              ${f.timestamp ? `<div class="fallback-time">${new Date(f.timestamp).toLocaleString('de-AT')}</div>` : ''}
            </div>
          `).join('')
          : '<div class="no-data">Keine Fallbacks – Evita läuft perfekt 🎉</div>'
        }
      </div>`;

      // ===== WEBSITE ROAST =====
      const roast = data.roast;
      if (roast && (roast.today?.total > 0 || roast.recentChecks?.length > 0)) {
        const rt = roast.today || {};
        const gradeColor = (note) => note <= 2 ? 'var(--green)' : note <= 3 ? 'var(--orange)' : 'var(--red)';

        html += `<div class="section-title" style="margin-top:32px;">🔥 Website-Roast</div>
          <div class="kpi-row">
            <div class="kpi-card">
              <div class="kpi-label">Roasts heute</div>
              <div class="kpi-value accent">${rt.total || 0}</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-label">Note 1-2</div>
              <div class="kpi-value green">${(rt.note_1 || 0) + (rt.note_2 || 0)}</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-label">Note 3</div>
              <div class="kpi-value orange">${rt.note_3 || 0}</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-label">Note 4-5</div>
              <div class="kpi-value red">${(rt.note_4 || 0) + (rt.note_5 || 0)}</div>
            </div>
          </div>`;

        if (roast.recentChecks && roast.recentChecks.length > 0) {
          html += `<div class="chart-card full-width" style="margin-top:16px;">
            <div class="chart-title">Letzte Roasts</div>
            ${roast.recentChecks.slice(0, 15).map(r => {
              const color = gradeColor(r.note);
              const time = new Date(r.timestamp).toLocaleString('de-AT', {

              });
              return `<div class="list-item">
                <span class="list-item-text" style="flex:1">
                  <span style="color:${color};font-weight:700;font-family:'JetBrains Mono',monospace;margin-right:10px;">Note ${r.note}</span>

            }).join('')}
          </div>`;

      return html;

    function renderEvitaCharts(data) {
      renderMessageChart(data.daily);
      renderModelChart(data.modelUsage);
